document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

at('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Barlow';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"6df2b101-fed7-43d2-b813-a5fb7d7e40dd\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Barlow';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"f8c727dd-867c-4106-badc-c3180eaf17e1\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }\n    body { background:#ece8df; font-family:'Barlow',Helvetica,sans-serif; color:#3e1508; overflow-x:hidden; }\n\n    @keyframes justFade { from{opacity:0} to{opacity:1} }\n    @keyframes navIn { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:translateY(0)} }\n\n    /* Scroll reveal */\n    .reveal {\n      opacity:0;\n      transform:translateY(28px);\n      transition:opacity 0.78s cubic-bezier(0.22,1,0.36,1), transform 0.78s cubic-bezier(0.22,1,0.36,1);\n    }\n\n    /* Nav */\n    .nav-link { font-size:11px; font-weight:400; letter-spacing:2.5px; text-transform:uppercase; color:#3e1508; text-decoration:none; transition:opacity 0.22s; }\n    .nav-link:hover { opacity:0.45; }\n\n    /* Stats */\n    .stat-cell { padding:40px 52px; border-right:1px solid rgba(62,21,8,0.1); }\n    .stat-cell:last-child { border-right:none; }\n\n    /* Diff blocks */\n    .diff-block { padding:36px 40px 36px 0; border-right:1px solid rgba(62,21,8,0.08); }\n    .diff-block:nth-child(2) { padding:36px 40px; }\n    .diff-block:last-child { border-right:none; padding:36px 0 36px 40px; }\n\n    /* FAQ */\n    .faq-row { border-bottom:1px solid rgba(62,21,8,0.1); }\n    .faq-trigger { display:flex; justify-content:space-between; align-items:center; padding:26px 0; cursor:pointer; gap:24px; }\n    .faq-trigger:hover .faq-q { opacity:0.6; }\n    .faq-q { font-size:15px; font-weight:400; letter-spacing:0.4px; transition:opacity 0.2s; }\n\n    /* Cert frames */\n    .cert-frame {\n      position:relative;\n      background:#faf7f2;\n      box-shadow:0 0 0 1px rgba(139,105,20,0.3), 0 0 0 6px #e8e2d8, 0 0 0 8px rgba(139,105,20,0.2), 0 12px 48px rgba(62,21,8,0.1);\n      transition:transform 0.38s cubic-bezier(0.22,1,0.36,1), box-shadow 0.38s ease;\n    }\n    .cert-frame:hover {\n      transform:translateY(-6px) rotate(0.4deg);\n      box-shadow:0 0 0 1px rgba(139,105,20,0.4), 0 0 0 6px #e8e2d8, 0 0 0 8px rgba(139,105,20,0.25), 0 28px 72px rgba(62,21,8,0.18);\n    }\n    .c-corner { position:absolute; width:22px; height:22px; z-index:2; pointer-events:none; }\n    .c-tl { top:14px; left:14px; border-top:1.5px solid rgba(139,105,20,0.7); border-left:1.5px solid rgba(139,105,20,0.7); }\n    .c-tr { top:14px; right:14px; border-top:1.5px solid rgba(139,105,20,0.7); border-right:1.5px solid rgba(139,105,20,0.7); }\n    .c-bl { bottom:14px; left:14px; border-bottom:1.5px solid rgba(139,105,20,0.7); border-left:1.5px solid rgba(139,105,20,0.7); }\n    .c-br { bottom:14px; right:14px; border-bottom:1.5px solid rgba(139,105,20,0.7); border-right:1.5px solid rgba(139,105,20,0.7); }\n\n    .year-badge { display:inline-block; background:#8B6914; color:#faf7f2; font-size:9px; font-weight:600; letter-spacing:2px; text-transform:uppercase; padding:5px 14px; margin-top:14px; }\n\n    /* Founder cards */\n    .founder-card { background:rgba(62,21,8,0.03); padding:40px; border:1px solid rgba(62,21,8,0.07); transition:border-color 0.3s; }\n    .founder-card:hover { border-color:rgba(62,21,8,0.16); }\n\n    /* Button */\n    .btn-primary { background:#6b1d0d; color:#ece8df; font-family:'Barlow',sans-serif; font-size:10px; font-weight:600; letter-spacing:3px; text-transform:uppercase; padding:16px 32px; border:none; cursor:pointer; transition:background 0.28s, transform 0.3s cubic-bezier(0.22,1,0.36,1); }\n    .btn-primary:hover { background:#8c2712; transform:translateY(-3px); }\n\n    @media (max-width:900px) {\n      .two-col { grid-template-columns:1fr !important; }\n      .three-col { grid-template-columns:1fr !important; }\n      .cert-wall { grid-template-columns:1fr !important; }\n      .cert-right-col { grid-template-columns:1fr !important; }\n      .section-wrap { padding:80px 28px !important; }\n      .hero-title { font-size:32px !important; letter-spacing:3px !important; }\n      .diff-block { padding:36px 0 !important; border-right:none !important; border-bottom:1px solid rgba(62,21,8,0.08); }\n      .diff-block:last-child { border-bottom:none; }\n      .stat-cell { border-right:none !important; border-bottom:1px solid rgba(62,21,8,0.1); padding:32px 0 !important; }\n      .stat-cell:last-child { border-bottom:none; }\n      .nav-utils { display:none !important; }\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<!-- ════════════════════════════════════════════════ -->\n<!--  SECTION 1 — ABOUT US                           -->\n<!-- ════════════════════════════════════════════════ -->\n<section id=\"about\" class=\"section-wrap\" style=\"position:relative; padding:80px 64px 0; background:#ece8df; overflow:hidden;\">\n\n  <!-- Ghost number -->\n\n\n  <!-- 2-col intro: title left · story + stats right -->\n  <div class=\"reveal two-col\" style=\"display:grid; grid-template-columns:45% 1fr; gap:72px; align-items:start; margin-bottom:64px; position:relative; z-index:1;\">\n\n    <div>\n      <div style=\"display:flex; align-items:center; gap:20px; margin-bottom:28px;\">\n        <span style=\"font-size:10px; font-weight:600; letter-spacing:4px; text-transform:uppercase; opacity:0.36;\">01<\u002Fspan>\n        <div style=\"height:1px; width:48px; background:#3e1508; opacity:0.25;\"><\u002Fdiv>\n        <span style=\"font-size:10px; font-weight:400; letter-spacing:4px; text-transform:uppercase; opacity:0.48;\">ABOUT US<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"hero-title\" style=\"font-size:46px; font-weight:300; letter-spacing:5px; text-transform:uppercase; line-height:1.1; margin-bottom:20px;\">BUILDING DREAMS WITH INTEGRITY &amp; CRAFT<\u002Fdiv>\n      <div style=\"font-size:10px; font-weight:400; letter-spacing:5px; text-transform:uppercase; opacity:0.34;\">BANGALORE · EST. 2020<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"padding-top:4px;\">\n      <p style=\"font-size:15px; font-weight:300; line-height:1.84; letter-spacing:0.2px; margin-bottom:44px; text-wrap:pretty; opacity:0.82;\">Founded in 2020, Poetry replaces the chaos of managing multiple vendors with a single integrated design-and-build solution. One team, one architect, one point of contact — from brief to handover. Over 20 years of combined experience, delivered under one roof at a contractor's price.<\u002Fp>\n      <div class=\"three-col\" style=\"display:grid; grid-template-columns:repeat(3,1fr); border-top:1px solid rgba(62,21,8,0.1);\">\n        <div style=\"padding:24px 28px 24px 0; border-right:1px solid rgba(62,21,8,0.1);\">\n          <div style=\"font-size:36px; font-weight:800; letter-spacing:-1px; line-height:1;\">20+<\u002Fdiv>\n          <div style=\"font-size:9px; font-weight:600; letter-spacing:3px; text-transform:uppercase; opacity:0.44; margin-top:8px; line-height:1.5;\">Years<br>Experience<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:24px 28px; border-right:1px solid rgba(62,21,8,0.1);\">\n          <div style=\"font-size:36px; font-weight:800; letter-spacing:-1px; line-height:1;\">100%<\u002Fdiv>\n          <div style=\"font-size:9px; font-weight:600; letter-spacing:3px; text-transform:uppercase; opacity:0.44; margin-top:8px; line-height:1.5;\">Integrated<br>Service<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:24px 0 24px 28px;\">\n          <div style=\"font-size:36px; font-weight:800; letter-spacing:-1px; line-height:1;\">1<\u002Fdiv>\n          <div style=\"font-size:9px; font-weight:600; letter-spacing:3px; text-transform:uppercase; opacity:0.44; margin-top:8px; line-height:1.5;\">Point of<br>Contact<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- Vision / Mission -->\n  <div class=\"reveal two-col\" style=\"display:grid; grid-template-columns:1fr 1fr; gap:3px; margin-bottom:64px; position:relative; z-index:1;\">\n    <div style=\"background:rgba(62,21,8,0.03); padding:36px; border:1px solid rgba(62,21,8,0.08);\">\n      <div style=\"font-size:9px; font-weight:600; letter-spacing:4px; text-transform:uppercase; opacity:0.32; margin-bottom:18px;\">VISION<\u002Fdiv>\n      <div style=\"width:28px; height:1.5px; background:#6b1d0d; opacity:0.45; margin-bottom:18px;\"><\u002Fdiv>\n      <p style=\"font-size:16px; font-weight:300; line-height:1.72; letter-spacing:0.2px;\">To be the leader in integrated design and construction services across India — making an architect affordable and approachable to every home.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:rgba(62,21,8,0.03); padding:36px; border:1px solid rgba(62,21,8,0.08);\">\n      <div style=\"font-size:9px; font-weight:600; letter-spacing:4px; text-transform:uppercase; opacity:0.32; margin-bottom:18px;\">MISSION<\u002Fdiv>\n      <div style=\"width:28px; height:1.5px; background:#6b1d0d; opacity:0.45; margin-bottom:18px;\"><\u002Fdiv>\n      <p style=\"font-size:16px; font-weight:300; line-height:1.72; letter-spacing:0.2px;\">To bring quality and affordability under one roof — offering an architect's expertise to every home project at a contractor's price.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- What we do differently -->\n  <div class=\"reveal\" style=\"position:relative; z-index:1; margin-bottom:32px;\">\n    <div style=\"font-size:9px; font-weight:600; letter-spacing:4px; text-transform:uppercase; opacity:0.34; margin-bottom:10px;\">WHAT WE DO DIFFERENTLY<\u002Fdiv>\n    <div style=\"font-size:30px; font-weight:300; letter-spacing:5px; text-transform:uppercase; line-height:1;\">OUR APPROACH<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"reveal three-col\" style=\"display:grid; grid-template-columns:repeat(3,1fr); border-top:1px solid rgba(62,21,8,0.08); margin-bottom:64px; position:relative; z-index:1;\">\n    <div class=\"diff-block\">\n      <div style=\"font-size:9px; font-weight:600; letter-spacing:3px; text-transform:uppercase; opacity:0.28; margin-bottom:22px;\">01<\u002Fdiv>\n      <div style=\"font-size:16px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; line-height:1.3; margin-bottom:18px;\">Dedicated Architect from Day One<\u002Fdiv>\n      <p style=\"font-size:14px; font-weight:300; line-height:1.82; opacity:0.68;\">Every Poetry client gets a dedicated architect working on their project from day one, hand-holding them throughout the full project duration — not just the design phase.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"diff-block\">\n      <div style=\"font-size:9px; font-weight:600; letter-spacing:3px; text-transform:uppercase; opacity:0.28; margin-bottom:22px;\">02<\u002Fdiv>\n      <div style=\"font-size:16px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; line-height:1.3; margin-bottom:18px;\">On-Site Engineering Supervision<\u002Fdiv>\n      <p style=\"font-size:14px; font-weight:300; line-height:1.82; opacity:0.68;\">Experienced engineers supervise and monitor every project on site — ensuring quality builds, on-time delivery, and a standard that sets us apart in the market.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"diff-block\">\n      <div style=\"font-size:9px; font-weight:600; letter-spacing:3px; text-transform:uppercase; opacity:0.28; margin-bottom:22px;\">03<\u002Fdiv>\n      <div style=\"font-size:16px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; line-height:1.3; margin-bottom:18px;\">Technology-Driven Project Updates<\u002Fdiv>\n      <p style=\"font-size:14px; font-weight:300; line-height:1.82; opacity:0.68;\">We bring technology to digitalise and simplify project management — regular progress updates, material selections, design finalisations and on-call consultation.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- FAQ -->\n  <div class=\"reveal\" style=\"position:relative; z-index:1; margin-bottom:32px;\">\n    <div style=\"font-size:9px; font-weight:600; letter-spacing:4px; text-transform:uppercase; opacity:0.34; margin-bottom:10px;\">QUESTIONS &amp; ANSWERS<\u002Fdiv>\n    <div style=\"font-size:30px; font-weight:300; letter-spacing:5px; text-transform:uppercase; line-height:1;\">FREQUENTLY ASKED<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"reveal\" style=\"max-width:840px; margin-bottom:64px; position:relative; z-index:1; border-top:1px solid rgba(62,21,8,0.1);\">\n    <sc-for list=\"{{ faqs }}\" as=\"faq\" hint-placeholder-count=\"5\">\n      <div class=\"faq-row\">\n        <div class=\"faq-trigger\" onclick=\"{{ faq.onToggle }}\">\n          <span class=\"faq-q\">{{ faq.q }}<\u002Fspan>\n          <span style=\"{{ faq.iconStyle }}\">+<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"{{ faq.bodyStyle }}\">\n          <p style=\"font-size:14px; font-weight:300; line-height:1.86; opacity:0.68; padding-bottom:28px; padding-right:52px;\">{{ faq.a }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <!-- Co-founders -->\n  <div class=\"reveal\" style=\"position:relative; z-index:1; margin-bottom:32px;\">\n    <div style=\"font-size:9px; font-weight:600; letter-spacing:4px; text-transform:uppercase; opacity:0.34; margin-bottom:10px;\">THE TEAM<\u002Fdiv>\n    <div style=\"font-size:30px; font-weight:300; letter-spacing:5px; text-transform:uppercase; line-height:1;\">CO-FOUNDERS<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"reveal two-col\" style=\"display:grid; grid-template-columns:1fr 1fr; gap:3px; margin-bottom:80px; position:relative; z-index:1;\">\n\n    <!-- Prajon -->\n    <div class=\"founder-card\">\n      <div style=\"width:160px; height:160px; background:#6b1d0d; border-radius:50%; display:flex; align-items:center; justify-content:center; margin-bottom:32px;\">\n        <span style=\"font-size:48px; font-weight:800; letter-spacing:1px; color:#ece8df;\">PN<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"margin-bottom:20px;\">\n        <div style=\"font-size:17px; font-weight:600; letter-spacing:2px; text-transform:uppercase; margin-bottom:8px;\">Prajon Nair<\u002Fdiv>\n        <div style=\"font-size:9px; font-weight:400; letter-spacing:3px; text-transform:uppercase; opacity:0.44; margin-bottom:14px;\">Co-Founder · Managing Partner<\u002Fdiv>\n        <div style=\"display:inline-block; background:rgba(107,29,13,0.09); padding:5px 14px;\">\n          <span style=\"font-size:9px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:#6b1d0d;\">ARCHITECT · 10+ YRS<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"width:28px; height:1.5px; background:#6b1d0d; opacity:0.32; margin-bottom:24px;\"><\u002Fdiv>\n      <p style=\"font-size:14px; font-weight:300; line-height:1.86; opacity:0.74;\">An architect with over 10 years of experience across residential, commercial and luxury resort projects, Prajon has always been driven to deliver quality and value. His ability to translate a client's vision into reality makes him one of Bangalore's most sought-after architects. He leads design and project execution, and is Poetry's chief of design.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- Praveen -->\n    <div class=\"founder-card\">\n      <di -content:space-between; gap:16px;\">\n          <div>\n            <div style=\"font-size:11px; font-weight:600; letter-spacing:2.5px; text-transform:uppercase; margin-bottom:6px;\">IGBC Membership Certificate<\u002Fdiv>\n            <div style=\"font-size:9px; font-weight:400; letter-spacing:2px; text-transform:uppercase; opacity:0.44; line-height:1.6;\">Indian Green Building Council · CII<br>Membership No. IGBCCS240055<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"year-badge\" style=\"flex-shrink:0;\">2024<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:absolute; bottom:68px; right:24px; width:28px; height:28px; border-radius:50%; background:radial-gradient(circle at 40% 35%, rgba(139,105,20,0.5), rgba(139,105,20,0.15)); border:1px solid rgba(139,105,20,0.4);\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Industry Outlook Magazine feature (wide landscape) -->\n      <div class=\"cert-frame\" style=\"transform:rotate(-0.4deg);\">\n        <div class=\"c-corner c-tl\"><\u002Fdiv>\n        <div class=\"c-corner c-tr\"><\u002Fdiv>\n        <div class=\"c-corner c-bl\"><\u002Fdiv>\n        <div class=\"c-corner c-br\"><\u002Fdiv>\n        <div style=\"aspect-ratio:16/9; background:#f0ece5; display:flex; align-items:center; justify-content:center;\">\n          <div style=\"text-align:center; opacity:0.28; padding:32px;\">\n            <div style=\"width:36px; height:36px; border:1px solid #3e1508; transform:rotate(45deg); margin:0 auto 20px;\"><\u002Fdiv>\n            <div style=\"font-size:9px; font-weight:600; letter-spacing:4px; text-transform:uppercase;\">EDITORIAL FEATURE<\u002Fdiv>\n            <div style=\"font-size:8px; letter-spacing:2px; text-transform:uppercase; opacity:0.6; margin-top:8px;\">IMAGE PLACEHOLDER<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:22px 28px 28px; display:flex; align-items:flex-start; justify-content:space-between; gap:16px;\">\n          <div>\n            <div style=\"font-size:11px; font-weight:600; letter-spacing:2.5px; text-transform:uppercase; margin-bottom:6px;\">Industry Outlook — Featured Article<\u002Fdiv>\n            <div style=\"font-size:9px; font-weight:400; letter-spacing:2px; text-transform:uppercase; opacity:0.44; line-height:1.6;\">A Competent Architecture &amp; Engineering Firm<br>Dedicated to Curating Exceptional Designs<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"year-badge\" style=\"flex-shrink:0;\">2023<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:absolute; bottom:68px; right:24px; width:28px; height:28px; border-radius:50%; background:radial-gradient(circle at 40% 35%, rgba(139,105,20,0.5), rgba(139,105,20,0.15)); border:1px solid rgba(139,105,20,0.4);\"><\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Divider + footer note -->\n  <div class=\"reveal\" style=\"height:1px; background:rgba(62,21,8,0.12); margin:80px 0 48px; position:relative; z-index:1;\"><\u002Fdiv>\n  <div class=\"reveal\" style=\"display:flex; align-items:center; justify-content:space-between; position:relative; z-index:1;\">\n    <span style=\"font-size:10px; font-weight:400; letter-spacing:3px; text-transform:uppercase; opacity:0.3;\">All certifications verified<\u002Fspan>\n    <div style=\"display:flex; align-items:center; gap:14px;\">\n      <div style=\"width:10px; height:10px; background:rgba(62,21,8,0.18); transform:rotate(45deg);\"><\u002Fdiv>\n      <span style=\"font-size:10px; font-weight:600; letter-spacing:3px; text-transform:uppercase; opacity:0.34;\">POETRY CONSTRUCTIONS<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fsection>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1440, &quot;height&quot;: 900 }\n}\">\nclass Component extends DCLogic {\n  state = { openFaq: null };\n\n  componentDidMount() {\n    // Scroll-reveal via IntersectionObserver\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach(e => {\n        if (e.isIntersecting) {\n          e.target.style.opacity = '1';\n          e.target.style.transform = 'translateY(0)';\n          io.unobserve(e.target);\n        }\n      });\n    }, { threshold: 0.07, rootMargin: '0px 0px -32px 0px' });\n\n    document.querySelectorAll('.reveal').forEach((el, i) => {\n      el.style.transitionDelay = ((i % 6) * 70) + 'ms';\n      io.observe(el);\n    });\n    this._io = io;\n  }\n\n  componentWillUnmount() {\n    if (this._io) this._io.disconnect();\n  }\n\n  renderVals() {\n    const FAQS = [\n      {\n        q: 'Why should one choose Poetry over other contractors?',\n        a: 'Poetry is known for trust and honest advisory. We are your partners throughout the journey of your dream home — helping you plan finances, avoid unnecessary spends, and suggesting utility-based designs with the right materials. No upsells, no surprises.',\n      },\n      {\n        q: 'Does Poetry demand extra funds mid-project?',\n        a: 'No. Poetry will help you plan your finances so that you never face unexpected costs. Every spend is well planned and communicated in advance — no unpleasant surprises, which is what sets us apart from others.',\n      },\n      {\n        q: 'Can designs be changed during construction?',\n        a: 'Designs are iterated and finalised during the design phase before construction starts. Minor, practically feasible changes can be accommodated during construction. Your architect walks you through every scenario before designs are finalised, so there are no doubts later on.',\n      },\n      {\n        q: 'Does the owner need to pay all the money at once?',\n        a: 'No. All payments are made as per the construction schedule, communicated clearly at the beginning of the project so you can plan your finances accordingly.',\n      },\n      {\n        q: 'Are architect services limited to only designing?',\n        a: 'No. Your dedicated Project Architect remains with you throughout the entire project cycle — advising on material selections, civil works, automation, solar electrification and more. Our architects are your partners for all seasons.',\n      },\n    ];\n\n    const open = this.state.openFaq;\n\n    return {\n      faqs: FAQS.map((f, i) => ({\n        ...f,\n        onToggle: () => this.setState({ openFaq: open === i ? null : i }),\n        bodyStyle: {\n          maxHeight: open === i ? '220px' : '0',\n          overflow: 'hidden',\n          transition: 'max-height 0.44s cubic-bezier(0.22,1,0.36,1)',\n        },\n        iconStyle: {\n          display: 'inline-block',\n          flexShrink: '0',\n          fontSize: '22px',\n          fontWeight: '300',\n          lineHeight: '1',\n          color: '#6b1d0d',\n          transform: open === i ? 'rotate(45deg)' : 'rotate(0deg)',\n          transition: 'transform 0.3s cubic-bezier(0.22,1,0.36,1)',\n        },\n      })),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
